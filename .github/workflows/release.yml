name: release

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install Linux release prerequisites
        run: sudo apt-get update && sudo apt-get install -y musl-tools python3
      - name: Verify installer sync
        run: python3 tools/sync_installers.py --check
      - name: Build Linux release bundle
        env:
          OBSERVANS_RELEASE_REPOSITORY: ${{ github.repository }}
        run: bash tools/build_release_linux.sh
      - name: Smoke Linux archive
        run: |
          mkdir -p smoke/linux
          tar -xzf dist/Observans-linux-x64.tar.gz -C smoke/linux
          test -x smoke/linux/Observans-linux-x64/observans
          test -x smoke/linux/Observans-linux-x64/_observans_runtime/ffmpeg/bin/ffmpeg
          smoke/linux/Observans-linux-x64/observans --help
      - name: Smoke Linux installer
        run: |
          mkdir -p smoke/http-root smoke/install-bin
          cp dist/Observans-linux-x64.tar.gz dist/Observans-linux-x64.tar.gz.sha256 dist/install.sh smoke/http-root/
          python3 -m http.server 18080 --directory smoke/http-root >/tmp/observans-http.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          OBSERVANS_RELEASE_BASE_URL="http://127.0.0.1:18080" \
          OBSERVANS_INSTALL_DIR="$PWD/smoke/install-root" \
          OBSERVANS_BIN_DIR="$PWD/smoke/install-bin" \
          bash smoke/http-root/install.sh
          test -x "$PWD/smoke/install-root/observans"
          test -x "$PWD/smoke/install-root/_observans_runtime/ffmpeg/bin/ffmpeg"
          "$PWD/smoke/install-bin/observans" --help
          OBSERVANS_INSTALL_DIR="$PWD/smoke/install-root" \
          OBSERVANS_BIN_DIR="$PWD/smoke/install-bin" \
          bash ./dist/uninstall.sh
          test ! -e "$PWD/smoke/install-root"
      - uses: actions/upload-artifact@v4
        with:
          name: observans-linux-x64
          path: |
            dist/Observans-linux-x64.tar.gz
            dist/Observans-linux-x64.tar.gz.sha256
            dist/install.sh
            dist/uninstall.sh

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build Windows release bundle
        shell: pwsh
        run: ./tools/build_release_windows.ps1
      - name: Smoke Windows archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path smoke | Out-Null
          Expand-Archive -Path dist/Observans-windows-x64.zip -DestinationPath smoke/windows -Force
          if (-not (Test-Path smoke/windows/Observans-windows-x64/observans.exe)) { throw "observans.exe missing" }
          if (-not (Test-Path smoke/windows/Observans-windows-x64/_observans_runtime/ffmpeg/bin/ffmpeg.exe)) { throw "bundled ffmpeg.exe missing" }
          & smoke/windows/Observans-windows-x64/observans.exe --help
      - uses: actions/upload-artifact@v4
        with:
          name: observans-windows-x64
          path: |
            dist/Observans-windows-x64.zip
            dist/Observans-windows-x64.zip.sha256

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: observans-linux-x64
          path: release-assets/linux
      - uses: actions/download-artifact@v4
        with:
          name: observans-windows-x64
          path: release-assets/windows
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/linux/*
            release-assets/windows/*
