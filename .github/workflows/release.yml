name: release

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install Linux release prerequisites
        run: sudo apt-get update && sudo apt-get install -y musl-tools python3
      - name: Verify installer sync
        run: python3 tools/sync_installers.py --check
      - name: Build Linux release bundle
        env:
          OBSERVANS_RELEASE_REPOSITORY: ${{ github.repository }}
        run: bash tools/build_release_linux.sh
      - name: Smoke Linux archive
        run: |
          mkdir -p smoke/linux
          tar -xzf dist/Observans-linux-x64.tar.gz -C smoke/linux
          test -x smoke/linux/Observans-linux-x64/observans
          test -x smoke/linux/Observans-linux-x64/Observans.sh
          test -x smoke/linux/Observans-linux-x64/_observans_runtime/ffmpeg/bin/ffmpeg
          test -f smoke/linux/Observans-linux-x64/README.md
          test -f smoke/linux/Observans-linux-x64/_observans_runtime/build_meta.json
          smoke/linux/Observans-linux-x64/Observans.sh --help
      - uses: actions/upload-artifact@v4
        with:
          name: observans-linux-x64
          path: |
            dist/Observans-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build Windows release bundle
        shell: pwsh
        run: ./tools/build_release_windows.ps1
      - name: Smoke Windows archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path smoke | Out-Null
          Expand-Archive -Path dist/Observans-windows-x64.zip -DestinationPath smoke/windows -Force
          if (-not (Test-Path smoke/windows/Observans-windows-x64/observans.exe)) { throw "observans.exe missing" }
          if (-not (Test-Path smoke/windows/Observans-windows-x64/_observans_runtime/ffmpeg/bin/ffmpeg.exe)) { throw "bundled ffmpeg.exe missing" }
          if (-not (Test-Path smoke/windows/Observans-windows-x64/README.md)) { throw "README.md missing" }
          if (-not (Test-Path smoke/windows/Observans-windows-x64/_observans_runtime/build_meta.json)) { throw "build_meta.json missing" }
          & smoke/windows/Observans-windows-x64/observans.exe --help
      - uses: actions/upload-artifact@v4
        with:
          name: observans-windows-x64
          path: |
            dist/Observans-windows-x64.zip

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: observans-linux-x64
          path: release-assets/linux
      - uses: actions/download-artifact@v4
        with:
          name: observans-windows-x64
          path: release-assets/windows
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/linux/*
            release-assets/windows/*
